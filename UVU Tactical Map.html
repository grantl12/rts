<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DEEP STATE RTS — UVU SECTOR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --teal: #00ffcc;
    --teal-dim: rgba(0,255,204,0.4);
    --teal-faint: rgba(0,255,204,0.12);
    --orange: #ff6600;
    --orange-dim: rgba(255,102,0,0.5);
    --dark: #060d0a;
    --panel: #07100d;
    --panel2: #0b1a15;
    --border: rgba(0,255,204,0.25);
    --mono: 'Share Tech Mono', 'Courier New', monospace;
    --pixel: 'Press Start 2P', monospace;
  }

  html, body {
    width: 100vw; height: 100vh;
    background: var(--dark);
    color: var(--teal);
    font-family: var(--mono);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  #topbar {
    flex-shrink: 0;
    height: 36px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 16px;
    gap: 0;
    justify-content: space-between;
  }
  .top-left { display: flex; align-items: center; gap: 24px; }
  .top-title {
    font-family: var(--pixel);
    font-size: 9px;
    color: var(--orange);
    letter-spacing: 1px;
    text-shadow: 0 0 12px var(--orange);
  }
  .top-mission {
    font-size: 10px;
    color: var(--teal-dim);
    letter-spacing: 2px;
  }
  .top-right { display: flex; align-items: center; gap: 20px; }
  .top-stat { font-size: 10px; letter-spacing: 1px; }
  .top-stat span { color: var(--orange); }
  #clock { font-size: 11px; color: var(--teal); letter-spacing: 2px; }
  .alert-badge {
    font-size: 9px; letter-spacing: 2px;
    padding: 3px 8px;
    border: 1px solid var(--orange);
    color: var(--orange);
    animation: blink 1.4s steps(1) infinite;
  }
  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0.3} }

  /* ── MAIN AREA ── */
  #main-area {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }

  /* ── MAP ── */
  #map-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: crosshair;
  }
  #map-canvas {
    display: block;
    image-rendering: pixelated;
  }
  #scanlines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 2;
  }
  #vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 3;
  }
  /* coord tooltip */
  #coord-tip {
    position: absolute;
    bottom: 12px; left: 16px;
    font-size: 10px; letter-spacing: 2px;
    color: var(--teal-dim);
    z-index: 10;
    pointer-events: none;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sb-section {
    border-bottom: 1px solid var(--border);
    padding: 10px 12px;
  }
  .sb-label {
    font-size: 8px;
    letter-spacing: 3px;
    color: rgba(0,255,204,0.45);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  /* Minimap */
  #minimap-wrap {
    position: relative;
    width: 196px; height: 130px;
    border: 1px solid var(--border);
    background: #030806;
    overflow: hidden;
  }
  #minimap-canvas { display: block; }
  #radar-sweep {
    position: absolute; inset: 0;
    border-radius: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .sweep-line {
    position: absolute;
    top: 0; left: 50%;
    width: 2px; height: 50%;
    transform-origin: bottom center;
    background: linear-gradient(to top, rgba(0,255,204,0.8), transparent);
    animation: sweep 3s linear infinite;
  }
  @keyframes sweep { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .sweep-fade {
    position: absolute; inset: 0;
    background: conic-gradient(from 180deg, rgba(0,255,204,0.15) 0deg, transparent 120deg, transparent 360deg);
    animation: sweep 3s linear infinite;
    transform-origin: center;
  }

  /* Building info */
  #bld-icon { width: 196px; height: 80px; background: #030806; border: 1px solid var(--border); margin-bottom: 8px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  #bld-icon canvas { display: block; }
  .bld-type-badge {
    position: absolute; bottom: 4px; right: 6px;
    font-size: 7px; letter-spacing: 2px; color: var(--orange);
  }
  #bld-name { font-size: 11px; letter-spacing: 1px; color: var(--teal); margin-bottom: 2px; line-height: 1.3; }
  #bld-sub { font-size: 9px; color: var(--orange); letter-spacing: 2px; margin-bottom: 8px; }
  #bld-desc { font-size: 9px; line-height: 1.6; color: rgba(0,255,204,0.6); margin-bottom: 10px; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; font-size: 9px; }
  .stat-row .label { color: rgba(0,255,204,0.5); letter-spacing: 1px; }
  .stat-row .val { color: var(--teal); }
  .hp-bar-wrap { height: 6px; background: #0d1a15; border: 1px solid var(--border); margin-top: 2px; margin-bottom: 8px; }
  .hp-bar { height: 100%; background: var(--teal); transition: width 0.3s; }

  /* Power */
  .power-bar-wrap { height: 10px; background: #0d1a15; border: 1px solid var(--border); margin-top: 4px; }
  .power-bar { height: 100%; background: linear-gradient(90deg, #ff6600, #ffaa00); }

  /* Credits */
  #credits-num { font-size: 20px; letter-spacing: 2px; color: var(--teal); text-shadow: 0 0 12px var(--teal-dim); }
  .credits-label { font-size: 8px; color: rgba(0,255,204,0.4); letter-spacing: 3px; }

  /* Action buttons */
  .action-btn {
    display: block; width: 100%;
    margin-bottom: 6px; padding: 7px 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--teal-dim);
    font-family: var(--mono);
    font-size: 9px; letter-spacing: 2px;
    text-align: left; cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .action-btn:hover {
    border-color: var(--teal);
    color: var(--teal);
    background: var(--teal-faint);
    text-shadow: 0 0 8px var(--teal);
  }
  .action-btn.selected {
    border-color: var(--orange);
    color: var(--orange);
    background: rgba(255,102,0,0.08);
  }
  .action-btn .btn-icon { margin-right: 8px; }

  #no-select {
    padding: 24px 0;
    text-align: center;
    font-size: 9px;
    color: rgba(0,255,204,0.25);
    letter-spacing: 2px;
    line-height: 2;
  }
</style>
</head>

<script>
// ─────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────
const GRID_W = 26, GRID_H = 22;
const TW = 72, TH = 36; // isometric tile width/height
const WH = 22;           // wall height per floor

const C = {
  dark:    '#060d0a',
  ground:  '#0e1c17',
  path:    '#152b23',
  plaza:   '#122218',
  grass:   '#0c1f14',
  teal:    '#00ffcc',
  tealDim: 'rgba(0,255,204,0.35)',
  tealFaint:'rgba(0,255,204,0.08)',
  orange:  '#ff6600',
  orangeDim:'rgba(255,102,0,0.5)',
  grid:    'rgba(0,255,204,0.13)',
  gridBright:'rgba(0,255,204,0.35)',
};

// ─────────────────────────────────────────────
//  TERRAIN MAP  (T: 0=off 1=ground 2=path 3=plaza 4=grass)
// ─────────────────────────────────────────────
const T = { OFF:0, GROUND:1, PATH:2, PLAZA:3, GRASS:4 };

function buildTerrain() {
  const m = Array.from({length:GRID_H}, ()=>Array(GRID_W).fill(T.OFF));

  // Campus footprint
  for(let y=1;y<GRID_H-1;y++) for(let x=1;x<GRID_W-1;x++) m[y][x]=T.GROUND;

  // Central plaza / quad
  for(let y=7;y<15;y++) for(let x=7;x<19;x++) m[y][x]=T.PLAZA;

  // Grass patches inside quad
  for(let y=8;y<10;y++) for(let x=8;x<11;x++) m[y][x]=T.GRASS;
  for(let y=12;y<14;y++) for(let x=15;x<18;x++) m[y][x]=T.GRASS;
  for(let y=8;y<10;y++) for(let x=15;x<18;x++) m[y][x]=T.GRASS;
  for(let y=12;y<14;y++) for(let x=8;x<11;x++) m[y][x]=T.GRASS;

  // Main N–S walkway (cols 12-13)
  for(let y=1;y<GRID_H-1;y++) { m[y][12]=T.PATH; m[y][13]=T.PATH; }
  // Main E–W walkway (rows 10-11)
  for(let x=1;x<GRID_W-1;x++) { m[10][x]=T.PATH; m[11][x]=T.PATH; }
  // Diagonal paths in quad
  for(let i=0;i<5;i++) { if(m[7+i] && m[7+i][7+i]) m[7+i][7+i]=T.PATH; }
  for(let i=0;i<5;i++) { if(m[7+i] && m[18-i]) m[7+i][18-i]=T.PATH; }

  return m;
}

const terrain = buildTerrain();

// ─────────────────────────────────────────────
//  BUILDINGS
// ─────────────────────────────────────────────
const BUILDINGS = [
  {
    id:'library', name:'FULTON LIBRARY', sub:'INTELLIGENCE HQ',
    x:2, y:1, w:5, h:3, floors:4,
    type:'intel', status:'OPERATIONAL',
    desc:'Primary intelligence nexus. Archives classified operational data. Enables satellite uplink for sector-wide vision.',
    hp:940, maxHp:1000, power:-18,
    topH: '#1a3830', topL: '#143028', topS: '#0f2420',
    wallL: '#0d2419', wallR: '#122e22',
  },
  {
    id:'cs', name:'ENGINEERING CENTER', sub:'TECH FACILITY',
    x:19, y:2, w:4, h:3, floors:5,
    type:'tech', status:'OPERATIONAL',
    desc:'Advanced research and cyber warfare facility. Unlocks unit upgrades and electronic countermeasures.',
    hp:750, maxHp:800, power:-22,
    topH: '#2e2a10', topL: '#261e0c', topS: '#1c1608',
    wallL: '#1c1a0d', wallR: '#22200f',
  },
  {
    id:'sorensen', name:'SORENSEN CENTER', sub:'COMMAND HQ',
    x:2, y:9, w:3, h:5, floors:3,
    type:'command', status:'OPERATIONAL',
    desc:'Primary command structure. Controls all campus operations. Loss triggers mission failure protocol.',
    hp:1500, maxHp:1500, power:-30,
    topH: '#2e1a0a', topL: '#261408', topS: '#1c1006',
    wallL: '#1c1008', wallR: '#22140a',
  },
  {
    id:'business', name:'WOODBURY BUSINESS', sub:'RESOURCE CENTER',
    x:21, y:9, w:3, h:5, floors:3,
    type:'resource', status:'OPERATIONAL',
    desc:'Economic intelligence hub. Generates §400 credits per cycle. Funds all campus expansion.',
    hp:580, maxHp:600, power:-10,
    topH: '#1a3018', topL: '#142a12', topS: '#10220e',
    wallL: '#0e220c', wallR: '#122a10',
  },
  {
    id:'fulton_center', name:'LOSEE CENTER', sub:'BARRACKS',
    x:7, y:17, w:6, h:3, floors:2,
    type:'barracks', status:'OPERATIONAL',
    desc:'Trains infantry and specialist units. Active recruitment pipeline. Capacity: 12 squads.',
    hp:700, maxHp:700, power:-12,
    topH: '#162030', topL: '#101828', topS: '#0c1220',
    wallL: '#0c1420', wallR: '#101828',
  },
  {
    id:'admin', name:'ADMINISTRATION', sub:'COMMAND ANNEX',
    x:15, y:17, w:5, h:3, floors:3,
    type:'command', status:'STANDBY',
    desc:'Secondary command node. Coordinates logistics and personnel deployment across sector.',
    hp:820, maxHp:900, power:-16,
    topH: '#2e1a0a', topL: '#261408', topS: '#1c1006',
    wallL: '#1c1008', wallR: '#22140a',
  },
  {
    id:'clock_tower', name:'CLOCK TOWER', sub:'SENSOR ARRAY',
    x:12, y:10, w:2, h:2, floors:9,
    type:'sensor', status:'ACTIVE',
    desc:'High-altitude sensor array. Maintains 500m radius surveillance. Critical for early warning.',
    hp:380, maxHp:400, power:-8,
    topH: '#203830', topL: '#182e28', topS: '#122420',
    wallL: '#0f2219', wallR: '#142c20',
  },
  {
    id:'parking', name:'NORTH PARKING', sub:'VEHICLE DEPOT',
    x:7, y:1, w:4, h:2, floors:1,
    type:'depot', status:'OPERATIONAL',
    desc:'Vehicle staging and refueling. Provides rapid deployment capability for ground units.',
    hp:200, maxHp:200, power:-4,
    topH: '#181818', topL: '#121212', topS: '#0e0e0e',
    wallL: '#0e0e0e', wallR: '#121212',
  },
];

// ─────────────────────────────────────────────
//  PATROL UNITS
// ─────────────────────────────────────────────
const units = [
  { x:12.5, y:3, dx:0, dy:0.008, path:'ns', leg:0, legDir:1, legMax:8, color:'#00ffcc' },
  { x:3.5,  y:10.5, dx:0.008, dy:0, path:'ew', leg:0, legDir:1, legMax:7, color:'#00ffcc' },
  { x:20.5, y:10.5, dx:-0.008, dy:0, path:'ew', leg:0, legDir:-1, legMax:7, color:'#00ffcc' },
  { x:12.5, y:18, dx:0, dy:-0.006, path:'ns', leg:0, legDir:-1, legMax:6, color:'#ffaa00' },
];

// ─────────────────────────────────────────────
//  ISOMETRIC PROJECTION
// ─────────────────────────────────────────────
let canvas, ctx, W, H, OX, OY;

function isoToScreen(gx, gy, gz=0) {
  return {
    x: OX + (gx - gy) * TW/2,
    y: OY + (gx + gy) * TH/2 - gz * WH
  };
}

function screenToGrid(sx, sy) {
  const rx = sx - OX, ry = sy - OY;
  return {
    x: (rx/TW + ry/TH),
    y: (ry/TH - rx/TW)
  };
}

// ─────────────────────────────────────────────
//  DRAW TILE
// ─────────────────────────────────────────────
function drawTile(ctx, gx, gy, fillTop, strokeColor) {
  const p = isoToScreen(gx, gy);
  const TL = isoToScreen(gx, gy);
  const TR = isoToScreen(gx+1, gy);
  const BL = isoToScreen(gx, gy+1);
  const BR = isoToScreen(gx+1, gy+1);

  ctx.beginPath();
  ctx.moveTo(TL.x + TW/2, TL.y);
  ctx.lineTo(TR.x + TW/2, TR.y);
  ctx.lineTo(BR.x + TW/2, BR.y);
  ctx.lineTo(BL.x + TW/2, BL.y);
  ctx.closePath();
  ctx.fillStyle = fillTop;
  ctx.fill();
  if(strokeColor) {
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
}

// ─────────────────────────────────────────────
//  DRAW BUILDING
// ─────────────────────────────────────────────
function drawBuilding(ctx2, b, highlight, preview=false, pw=196, ph=80) {
  const floors = b.floors;
  const h = floors * WH;

  let ox=0, oy=0;
  if(preview) {
    // Fit in bld-preview canvas
    const cx = pw/2, cy = ph*0.7;
    ox = cx - (b.w - b.h) * TW/4;
    oy = cy - (b.w + b.h) * TH/4 + h/2;
  }

  const pts = (gx, gy, gz) => {
    if(preview) {
      return { x: ox + (gx - gy)*TW/2, y: oy + (gx + gy)*TH/2 - gz*WH };
    }
    return isoToScreen(gx, gy, gz);
  };

  const x=b.x, y=b.y, w=b.w, hh=b.h;

  // -- Left wall
  const ll = [
    pts(x,      y+hh, 0),
    pts(x+w,    y+hh, 0),
    pts(x+w,    y+hh, floors),
    pts(x,      y+hh, floors),
  ];
  ctx2.beginPath();
  ll.forEach((p,i)=>i?ctx2.lineTo(p.x,p.y):ctx2.moveTo(p.x,p.y));
  ctx2.closePath();
  ctx2.fillStyle = b.wallL;
  ctx2.fill();

  // -- Right wall
  const rr = [
    pts(x+w, y,    0),
    pts(x+w, y+hh, 0),
    pts(x+w, y+hh, floors),
    pts(x+w, y,    floors),
  ];
  ctx2.beginPath();
  rr.forEach((p,i)=>i?ctx2.lineTo(p.x,p.y):ctx2.moveTo(p.x,p.y));
  ctx2.closePath();
  ctx2.fillStyle = b.wallR;
  ctx2.fill();

  // -- Top face
  const top = [
    pts(x,   y,    floors),
    pts(x+w, y,    floors),
    pts(x+w, y+hh, floors),
    pts(x,   y+hh, floors),
  ];
  ctx2.beginPath();
  top.forEach((p,i)=>i?ctx2.lineTo(p.x,p.y):ctx2.moveTo(p.x,p.y));
  ctx2.closePath();
  ctx2.fillStyle = b.topH;
  ctx2.fill();

  // -- Top detail lines
  ctx2.strokeStyle = highlight ? C.orange : 'rgba(0,255,204,0.2)';
  ctx2.lineWidth = highlight ? 1.5 : 0.5;
  ctx2.stroke();

  // -- Edge outlines
  ctx2.strokeStyle = highlight ? C.orange : 'rgba(0,255,204,0.3)';
  ctx2.lineWidth = highlight ? 1.5 : 0.7;

  function outline(pts) {
    ctx2.beginPath();
    pts.forEach((p,i)=>i?ctx2.lineTo(p.x,p.y):ctx2.moveTo(p.x,p.y));
    ctx2.closePath();
    ctx2.stroke();
  }
  outline(ll); outline(rr); outline(top);

  // -- Windows on walls (horizontal lines)
  if(!preview) {
    ctx2.strokeStyle = highlight ? 'rgba(255,102,0,0.3)' : 'rgba(0,255,204,0.12)';
    ctx2.lineWidth = 0.5;
    for(let f=1; f<floors; f++) {
      // left wall window line
      const la = pts(x, y+hh, f), lb = pts(x+w, y+hh, f);
      ctx2.beginPath(); ctx2.moveTo(la.x,la.y); ctx2.lineTo(lb.x,lb.y); ctx2.stroke();
      // right wall window line
      const ra = pts(x+w, y, f), rb = pts(x+w, y+hh, f);
      ctx2.beginPath(); ctx2.moveTo(ra.x,ra.y); ctx2.lineTo(rb.x,rb.y); ctx2.stroke();
    }
  }

  // -- Glow on highlight
  if(highlight && !preview) {
    ctx2.shadowColor = C.orange;
    ctx2.shadowBlur = 14;
    outline(top);
    ctx2.shadowBlur = 0;
  }

  // -- Name label (main map only)
  if(!preview && !highlight) {
    const mid = pts(x+w/2, y+hh/2, floors+0.3);
    ctx2.fillStyle = 'rgba(0,255,204,0.55)';
    ctx2.font = '7px "Share Tech Mono"';
    ctx2.textAlign = 'center';
    ctx2.fillText(b.name, mid.x, mid.y);
  }
  if(!preview && highlight) {
    const mid = pts(x+w/2, y+hh/2, floors+0.3);
    ctx2.fillStyle = C.orange;
    ctx2.font = 'bold 8px "Share Tech Mono"';
    ctx2.textAlign = 'center';
    ctx2.shadowColor = C.orange; ctx2.shadowBlur = 8;
    ctx2.fillText('◈ ' + b.name, mid.x, mid.y);
    ctx2.shadowBlur = 0;
  }
}

// ─────────────────────────────────────────────
//  DRAW UNIT
// ─────────────────────────────────────────────
function drawUnit(u) {
  const s = isoToScreen(u.x, u.y, 0.3);
  ctx.beginPath();
  ctx.arc(s.x + TW/2, s.y, 4, 0, Math.PI*2);
  ctx.fillStyle = u.color;
  ctx.shadowColor = u.color; ctx.shadowBlur = 10;
  ctx.fill();
  ctx.shadowBlur = 0;
  // Direction indicator
  ctx.beginPath();
  ctx.arc(s.x + TW/2, s.y, 7, 0, Math.PI*2);
  ctx.strokeStyle = u.color + '55';
  ctx.lineWidth = 1;
  ctx.stroke();
}

// ─────────────────────────────────────────────
//  DRAW NEON GRID
// ─────────────────────────────────────────────
function drawGrid() {
  ctx.lineWidth = 0.5;
  for(let gx=0; gx<=GRID_W; gx++) {
    for(let gy=0; gy<=GRID_H; gy++) {
      // vertical iso lines (constant gx)
      if(gy < GRID_H) {
        const a = isoToScreen(gx, gy);
        const b = isoToScreen(gx, gy+1);
        ctx.beginPath();
        ctx.moveTo(a.x + TW/2, a.y);
        ctx.lineTo(b.x + TW/2, b.y);
        ctx.strokeStyle = (gx%5===0) ? C.gridBright : C.grid;
        ctx.stroke();
      }
      // horizontal iso lines (constant gy)
      if(gx < GRID_W) {
        const a = isoToScreen(gx, gy);
        const b = isoToScreen(gx+1, gy);
        ctx.beginPath();
        ctx.moveTo(a.x + TW/2, a.y);
        ctx.lineTo(b.x + TW/2, b.y);
        ctx.strokeStyle = (gy%5===0) ? C.gridBright : C.grid;
        ctx.stroke();
      }
    }
  }
}

// ─────────────────────────────────────────────
//  MAIN RENDER
// ─────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = C.dark;
  ctx.fillRect(0, 0, W, H);

  // -- Terrain tiles
  for(let gy=0; gy<GRID_H; gy++) {
    for(let gx=0; gx<GRID_W; gx++) {
      const t = terrain[gy][gx];
      if(t === T.OFF) continue;
      let fill;
      switch(t) {
        case T.GROUND: fill = C.ground; break;
        case T.PATH:   fill = C.path;   break;
        case T.PLAZA:  fill = C.plaza;  break;
        case T.GRASS:  fill = C.grass;  break;
        default: fill = C.ground;
      }
      drawTile(ctx, gx, gy, fill, null);
    }
  }

  // -- Grid overlay
  drawGrid();

  // -- Buildings (back to front for iso depth)
  const sorted = [...BUILDINGS].sort((a,b) => (a.x+a.y) - (b.x+b.y));
  sorted.forEach(b => {
    drawBuilding(ctx, b, selectedBuilding && selectedBuilding.id === b.id);
  });

  // -- Units
  units.forEach(drawUnit);

  // -- Plaza center marker
  const center = isoToScreen(12.5, 11, 0.05);
  ctx.beginPath();
  ctx.arc(center.x + TW/2, center.y, 6, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(0,255,204,0.4)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(center.x + TW/2, center.y, 12, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(0,255,204,0.15)';
  ctx.stroke();
}

// ─────────────────────────────────────────────
//  MINIMAP
// ─────────────────────────────────────────────
function renderMinimap() {
  const mc = document.getElementById('minimap-canvas');
  const mx = mc.getContext('2d');
  const mw = 196, mh = 130;
  const scaleX = mw / GRID_W, scaleY = mh / GRID_H;

  mx.fillStyle = '#030806';
  mx.fillRect(0,0,mw,mh);

  // Terrain
  for(let gy=0; gy<GRID_H; gy++) {
    for(let gx=0; gx<GRID_W; gx++) {
      const t = terrain[gy][gx];
      let fill;
      switch(t) {
        case T.GROUND: fill = '#0e1c17'; break;
        case T.PATH:   fill = '#1c3a2a'; break;
        case T.PLAZA:  fill = '#162a20'; break;
        case T.GRASS:  fill = '#0c2010'; break;
        default: fill = '#060d0a'; break;
      }
      mx.fillStyle = fill;
      mx.fillRect(gx*scaleX, gy*scaleY, scaleX+0.5, scaleY+0.5);
    }
  }

  // Buildings
  BUILDINGS.forEach(b => {
    mx.fillStyle = b.topH;
    mx.fillRect(b.x*scaleX, b.y*scaleY, b.w*scaleX, b.h*scaleY);
    mx.strokeStyle = 'rgba(0,255,204,0.5)';
    mx.lineWidth = 0.5;
    mx.strokeRect(b.x*scaleX, b.y*scaleY, b.w*scaleX, b.h*scaleY);
  });

  // Units
  units.forEach(u => {
    mx.beginPath();
    mx.arc(u.x*scaleX, u.y*scaleY, 2, 0, Math.PI*2);
    mx.fillStyle = u.color;
    mx.fill();
  });
}

// ─────────────────────────────────────────────
//  BUILDING PREVIEW (sidebar icon)
// ─────────────────────────────────────────────
function renderBuildingPreview(b) {
  const pc = document.getElementById('bld-preview');
  const px = pc.getContext('2d');
  px.clearRect(0,0,196,80);
  px.fillStyle = '#030806';
  px.fillRect(0,0,196,80);

  // Draw building centered in preview
  const savedOX = OX, savedOY = OY;
  drawBuilding(px, {...b, x:0, y:0}, false, true, 196, 80);
}

// ─────────────────────────────────────────────
//  SELECTION
// ─────────────────────────────────────────────
let selectedBuilding = null;
let hoverBuilding = null;

function selectBuilding(b) {
  selectedBuilding = b;
  document.getElementById('no-select').style.display = b ? 'none' : 'block';
  document.getElementById('bld-detail').style.display = b ? 'block' : 'none';
  if(!b) return;

  document.getElementById('bld-name').textContent = b.name;
  document.getElementById('bld-sub').textContent = b.sub;
  document.getElementById('bld-desc').textContent = b.desc;
  const hpPct = Math.round(b.hp/b.maxHp*100);
  document.getElementById('bld-hp-val').textContent = `${b.hp}/${b.maxHp} (${hpPct}%)`;
  document.getElementById('bld-hp-bar').style.width = hpPct+'%';
  document.getElementById('bld-hp-bar').style.background = hpPct > 60 ? C.teal : hpPct > 30 ? '#ffaa00' : '#ff3300';
  document.getElementById('bld-power').textContent = `${b.power} MW`;
  document.getElementById('bld-status').textContent = b.status;
  const typeLabels = {intel:'INTEL',tech:'TECH',command:'CMD',resource:'ECON',barracks:'MIL',sensor:'SENSOR',depot:'DEPOT'};
  document.getElementById('bld-type-badge').textContent = typeLabels[b.type] || b.type.toUpperCase();

  renderBuildingPreview(b);
}

// ─────────────────────────────────────────────
//  HIT TEST
// ─────────────────────────────────────────────
function hitTestBuildings(mx, my) {
  // Check buildings back-to-front (reversed for front-priority)
  const sorted = [...BUILDINGS].sort((a,b)=>(b.x+b.y)-(a.x+a.y));
  for(const b of sorted) {
    // Check if mx,my is within the isometric footprint of building top
    const tl = isoToScreen(b.x,    b.y,    b.floors);
    const tr = isoToScreen(b.x+b.w,b.y,    b.floors);
    const bl = isoToScreen(b.x,    b.y+b.h,b.floors);
    const br = isoToScreen(b.x+b.w,b.y+b.h,b.floors);

    function inPoly(px,py,pts) {
      let inside=false;
      for(let i=0,j=pts.length-1;i<pts.length;j=i++) {
        const xi=pts[i].x,yi=pts[i].y,xj=pts[j].x,yj=pts[j].y;
        if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi)) inside=!inside;
      }
      return inside;
    }

    // Adjust for tile center offset
    const adj = [{x:tl.x+TW/2,y:tl.y},{x:tr.x+TW/2,y:tr.y},{x:br.x+TW/2,y:br.y},{x:bl.x+TW/2,y:bl.y}];
    // Also check wall area: extend down by wall height
    const botL = isoToScreen(b.x,    b.y+b.h, 0);
    const botR = isoToScreen(b.x+b.w,b.y+b.h, 0);
    const wallAdj = [
      {x:bl.x+TW/2,y:bl.y},{x:br.x+TW/2,y:br.y},
      {x:botR.x+TW/2,y:botR.y},{x:botL.x+TW/2,y:botL.y}
    ];

    if(inPoly(mx,my,adj) || inPoly(mx,my,wallAdj)) return b;
  }
  return null;
}

// ─────────────────────────────────────────────
//  INIT + RESIZE
// ─────────────────────────────────────────────
function resize() {
  canvas = document.getElementById('map-canvas');
  const wrap = document.getElementById('map-wrap');
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width = W;
  canvas.height = H;
  ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  // Center the map
  OX = W/2 - (GRID_W - GRID_H) * TW/4 - TW/2;
  OY = 80;
}

// ─────────────────────────────────────────────
//  EVENTS
// ─────────────────────────────────────────────
document.getElementById('map-canvas').addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  hoverBuilding = hitTestBuildings(mx, my);
  canvas.style.cursor = hoverBuilding ? 'pointer' : 'crosshair';
  const g = screenToGrid(mx - TW/2, my);
  const gx = Math.floor(g.x), gy = Math.floor(g.y);
  document.getElementById('coord-tip').textContent =
    `GRID: ${String(gx).padStart(2,'0')},${String(gy).padStart(2,'0')} · SECTOR ${Math.floor(gx/5)+1}-${Math.floor(gy/5)+1}`;
});

document.getElementById('map-canvas').addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const hit = hitTestBuildings(mx, my);
  selectBuilding(hit);
});

// Sidebar buttons
['btn-view','btn-patrol','btn-alert'].forEach(id => {
  document.getElementById(id).addEventListener('click', function() {
    document.querySelectorAll('.action-btn').forEach(b=>b.classList.remove('selected'));
    this.classList.add('selected');
  });
});

// ─────────────────────────────────────────────
//  UNIT ANIMATION
// ─────────────────────────────────────────────
function updateUnits() {
  units.forEach(u => {
    u.x += u.dx * u.legDir;
    u.y += u.dy * u.legDir;
    u.leg += Math.abs(u.dx + u.dy);
    if(u.leg > u.legMax) {
      u.leg = 0;
      u.legDir *= -1;
    }
  });
}

// ─────────────────────────────────────────────
//  CLOCK + CREDITS
// ─────────────────────────────────────────────
let startTime = Date.now();
let credits = 4820;

function updateHUD() {
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const h = Math.floor(elapsed/3600), m = Math.floor((elapsed%3600)/60), s = elapsed%60;
  const ts = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  document.getElementById('clock').textContent = ts;

  credits = Math.min(99999, credits + 2);
  const cs = `§${credits.toLocaleString()}`;
  document.getElementById('credits-top').textContent = cs;
  document.getElementById('credits-num').textContent = cs;
}

// ─────────────────────────────────────────────
//  LOOP
// ─────────────────────────────────────────────
let frame = 0;
function loop() {
  frame++;
  updateUnits();
  if(frame % 2 === 0) render();
  if(frame % 3 === 0) renderMinimap();
  if(frame % 60 === 0) updateHUD();
  requestAnimationFrame(loop);
}

window.addEventListener('resize', () => { resize(); });

const mapWrap = document.getElementById('map-wrap');
const ro = new ResizeObserver(() => { resize(); });
ro.observe(mapWrap);

// Also kick off once DOM is fully painted
requestAnimationFrame(() => { resize(); loop(); });
</script>
